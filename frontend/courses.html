<div class="page">
  <div class="page-header">
    <h2>Registration</h2>
    <p class="page-subtitle">Search and register for available course sections.</p>
  </div>

  <div class="search-panel">
    <div class="search-grid">
      <input list="courseTitleList" id="courseName" placeholder="Course Title" />
      <datalist id="courseTitleList"></datalist>

      <input list="courseNumberList" id="courseNumber" placeholder="Course Number" />
      <datalist id="courseNumberList"></datalist>

      <input list="instructorList" id="instructor" placeholder="Instructor" />
      <datalist id="instructorList"></datalist>

      <input list="departmentList" id="department" placeholder="Department" />
      <datalist id="departmentList"></datalist>

      <button onclick="searchCourses()">Search</button>
    </div>
  </div>

  <div class="table-panel">
    <table class="course-table">
      <thead>
        <tr>
          <th>Title</th>
          <th>Instructor</th>
          <th>Meeting Time</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="courseTableBody">
        <tr>
          <td colspan="5">Loading courses...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
